

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:

          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: ${CORS_ALLOWED_ORIGINS}
                allowedHeaders: "*"
                allowedMethods: "*"
                allowCredentials: ${CORS_ALLOWED_CREDENTIALS}

          routes:

            - id: insper
              uri: https://www.insper.edu.br
              predicates:
                - Path=/insper/**

            - id: accounts
              uri: http://account:8080 # hostname da maquina
              predicates:
                - Path=/accounts/**

            - id: auth
              uri: http://auth:8080 # hostname da maquina
              predicates:
                - Path=/auth/**

            - id: products
              uri: http://product:8080
              predicates:
                - Path=/products/**

            - id: exchange
              uri: http://exchange:8080
              predicates:
                - Path=/exchange/**

            - id: orders
              uri: http://order:8080
              predicates:
                - Path=/orders/**
      metrics:
        enabled: true

management:
  endpoints:
    web:
      base-path: /gateway/actuator
      exposure:
        include: ['prometheus']

logging:
  level:
    root: info
    store: debug
    org.springframework.web: debug
